<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ action }} Student</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #333; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 8px 20px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; }
    a { display: inline-block; margin-top: 12px; color: #4a90d9; }
  </style>
</head>
<body>
  <h1>{{ action }} Student</h1>
  <form method="POST">
    <label>Name</label>
    <input type="text" name="name" value="{{ student.name if student else '' }}" required>

    <label>Email</label>
    <input type="email" name="email" value="{{ student.email if student else '' }}" required>

    <label>Age</label>
    <input type="number" name="age" value="{{ student.age if student else '' }}" required min="1">

    <label>Department</label>
    <input type="text" name="department" value="{{ student.department if student else '' }}" required>

    <button type="submit">{{ action }}</button>
  </form>
  <a href="{{ url_for('index') }}">← Back to list</a>
</body>
</html>
